syntax = "proto3";

package coordinator.v1;

option go_package = "github.com/0xciph3r/attested-custody/proto/coordinator/v1;coordinatorv1";

message CreateSessionRequest {
  string request_id = 1;
  bytes payload_hash = 2;
  repeated string required_signers = 3;
}

message CreateSessionResponse {
  string session_id = 1;
  string status = 2;
  uint32 threshold = 3;
  repeated string participants = 4;
  int64 created_unix = 5;
  int64 expires_unix = 6;
}

message IssueChallengeRequest {
  string session_id = 1;
  string signer_id = 2;
}

message IssueChallengeResponse {
  bytes nonce = 1;
}

message SubmitAttestationRequest {
  string session_id = 1;
  string signer_id = 2;
  bytes nonce = 3;
  string module_id = 4;
  map<uint32, bytes> pcrs = 5;
  int64 timestamp_unix = 6;
}

message SubmitAttestationResponse {
  string status = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message SessionParticipant {
  string signer_id = 1;
  bool attested = 2;
  bool commitment_received = 3;
  bool share_received = 4;
}

message GetSessionResponse {
  string session_id = 1;
  string status = 2;
  uint32 threshold = 3;
  repeated SessionParticipant participants = 4;
  int64 created_unix = 5;
  int64 expires_unix = 6;
}

service CoordinatorService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc IssueChallenge(IssueChallengeRequest) returns (IssueChallengeResponse);
  rpc SubmitAttestation(SubmitAttestationRequest) returns (SubmitAttestationResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
}
